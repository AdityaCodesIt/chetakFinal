<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
/* Breach Intro Effect */
@keyframes screen-breach {
    0% {
        transform: scale(1.1);
        filter: brightness(5) contrast(2) hue-rotate(90deg);
        opacity: 0;
        } 5% {
        opacity: 1;
        filter: brightness(10) contrast(5);
        } 10% {
        transform: scale(1) skewX(20deg);
        filter: brightness(1) contrast(1);
        } 15% {
        transform: skewX(-20deg);
        } 20% {
        transform: skewX(0);
        }
    }
/* Violent Logo Jitter */
@keyframes violent-jitter {
    0% {
        transform: translate(0, 0) scale(1);
        text-shadow: 2px 2px #f00, -2px -2px #0ff;
        } 10% {
        transform: translate(-2px, 1px) scale(1.01);
        } 20% {
        transform: translate(2px, -2px) scale(0.99);
        text-shadow: -3px 0 #f00, 3px 0 #0ff;
        } 30% {
        transform: translate(-1px, 2px);
        } 40% {
        transform: translate(1px, -1px) scale(1.02);
        } 50% {
        transform: translate(-2px, -2px);
        text-shadow: 4px 0 #f00, -4px 0 #0ff;
        } 60% {
        transform: translate(2px, 1px);
        } 70% {
        transform: translate(-1px, -1px);
        } 80% {
        transform: translate(2px, 2px) scale(0.98);
        } 90% {
        transform: translate(-2px, 1px);
        } 100% {
        transform: translate(0, 0);
        text-shadow: 2px 2px #f00, -2px -2px #0ff;
        }
    }
/* Power Surge Glow */
@keyframes power-surge {
    0%, 100% {
        box-shadow: 0 0 5px rgba(255, 255, 255, 0.2), inset 0 0 0px rgba(255, 255, 255, 0);
        } 50% {
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.4);
        } 52% {
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.9), inset 0 0 15px rgba(255, 255, 255, 0.6);
        } 54% {
        box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.4);
        }
    }
/* Scanlines Effect */
.scanlines {
    position: fixed;
    inset: 0;
    background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
    background-size: 100% 4px;
    z-index: 10;
    pointer-events: none;
    opacity: 0.15
    }
.noise-layer {
    position: fixed;
    inset: 0;
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuA-MwXwxphBNrijqHWVIWuEb76Eb9neP5v8Rxv12xmcArFIrjH2Q1Wq3_WwFGi-QrEgi8ytQnKrioa-t1Scks_z1lb-xpp391EuMFJWzY0Vd3tafpbN8tfNPrXVTLvLpz_0yBJS889Co01CpctEfN8SVlFabbAvu1UTp4qfvG2rXdyP_N5XsRspWKRppX7Ax6ky8nWW3PbSFPHN75ygIijhE-q9AIip2wJBmrVZu_8SLh2zjNptxXqKSPtuAzgtz0qpoiITdHnxJbCX);
    opacity: 0.05;
    z-index: 5;
    pointer-events: none
    }
.breach-overlay {
    position: fixed;
    inset: 0;
    background: white;
    z-index: 100;
    pointer-events: none;
    animation: breach-flash 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards
    }
@keyframes breach-flash {
    0% {
        opacity: 1;
        transform: scaleY(1);
        } 40% {
        opacity: 1;
        transform: scaleY(0.01);
        } 100% {
        opacity: 0;
        transform: scaleY(0);
        }
    }
.glitch-text {
    animation: violent-jitter 0.15s infinite;
    display: inline-block
    }
.intro-motion-blur {
    animation: motion-blur-entry 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards
    }
@keyframes motion-blur-entry {
    0% {
        transform: translateY(50px) scaleY(1.5);
        filter: blur(20px);
        opacity: 0;
        } 100% {
        transform: translateY(0) scaleY(1);
        filter: blur(0);
        opacity: 1;
        }
    }
body {
    min-height: 100dvh;
    overflow: hidden;
    background: transparent
    }
.btn-surge {
    animation: power-surge 4s infinite
    }
.btn-surge:active {
    transform: scale(0.92) !important;
    transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1)
    }</style>
</head>
<body class="text-on-background font-body selection:bg-primary selection:text-on-primary flex flex-col justify-center items-center">
<!-- Cinematic Layers -->
<div class="breach-overlay"></div>
<div class="scanlines"></div>
<div class="noise-layer"></div>
<main class="flex-grow flex flex-col items-center justify-center w-full px-6 absolute inset-0 intro-motion-blur">
<!-- Centered Content Wrapper -->
<div class="flex flex-col items-center justify-center text-center space-y-24">
<!-- Branding -->
<div>
<h1 class="font-headline text-8xl md:text-9xl font-black italic tracking-tighter text-white uppercase glitch-text">
                    AAPDA
                </h1>
<p class="font-label text-[10px] tracking-[0.8em] text-outline uppercase mt-6 opacity-60 animate-pulse">
                    Secure Void Protocol // Initializing
                </p>
</div>
<!-- Centered Action Area -->
<div class="w-full max-w-sm px-6 intro-motion-blur" style="animation-delay: 0.2s">
<button class="btn-surge group relative w-full bg-white text-black px-8 py-5 font-headline font-bold uppercase tracking-[0.25em] transition-all hover:bg-neutral-100 flex items-center justify-center gap-4">

<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                    Sign in with Google
                    
                    <!-- Monolithic Decorative Elements -->
<div class="absolute inset-0 border border-white/40 -translate-x-1 -translate-y-1 pointer-events-none group-hover:translate-x-0 group-hover:translate-y-0 transition-transform"></div>
<div class="absolute -right-2 -top-2 w-4 h-4 border-r border-t border-white/50"></div>
<div class="absolute -left-2 -bottom-2 w-4 h-4 border-l border-b border-white/50"></div>
</button>
<div class="mt-8 flex justify-center gap-1">
<span class="h-1 w-8 bg-white/20"></span>
<span class="h-1 w-2 bg-white/40"></span>
<span class="h-1 w-1 bg-white/10"></span>
</div>
</div>
</div>
</main>
<!-- Subliminal Background Grain/Static -->
<div class="fixed inset-0 pointer-events-none opacity-[0.05] bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] z-[-1]"></div>
</body></html>
