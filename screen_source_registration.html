<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AAPDA - Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-tint": "#c6c6c7",
                        "surface-variant": "#353535",
                        "inverse-primary": "#5d5f5f",
                        "on-primary": "#1a1c1c",
                        "surface-container": "#1f1f1f",
                        "surface-container-high": "#2a2a2a",
                        "primary": "#ffffff",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "tertiary-fixed-dim": "#464747",
                        "on-tertiary-container": "#000000",
                        "on-secondary-container": "#e4e2e1",
                        "surface-bright": "#393939",
                        "on-error": "#690005",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-fixed-variant": "#e4e2e2",
                        "secondary-container": "#474747",
                        "surface-container-low": "#1b1b1b",
                        "on-secondary-fixed-variant": "#3b3b3b",
                        "tertiary": "#e4e2e2",
                        "on-tertiary": "#1b1c1c",
                        "tertiary-fixed": "#5e5e5e",
                        "primary-fixed-dim": "#454747",
                        "primary-container": "#d4d4d4",
                        "inverse-surface": "#e2e2e2",
                        "surface-container-highest": "#353535",
                        "on-surface-variant": "#c6c6c6",
                        "on-primary-fixed": "#ffffff",
                        "on-secondary": "#1b1c1c",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#919090",
                        "surface-dim": "#131313",
                        "error-container": "#93000a",
                        "on-background": "#e2e2e2",
                        "inverse-on-surface": "#303030",
                        "surface": "#131313",
                        "on-tertiary-fixed": "#ffffff",
                        "secondary-fixed-dim": "#acabaa",
                        "secondary": "#c8c6c6",
                        "on-primary-container": "#000000",
                        "error": "#ffb4ab",
                        "on-surface": "#e2e2e2",
                        "outline": "#919191",
                        "secondary-fixed": "#c8c6c6",
                        "on-secondary-fixed": "#1b1c1c",
                        "background": "#131313",
                        "outline-variant": "#474747",
                        "primary-fixed": "#5d5f5f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Inter"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #131313;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .tech-outline {
            outline: 1px solid rgba(71, 71, 71, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary selection:text-on-primary overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#131313] flex justify-between items-center px-6 py-4 backdrop-blur-md bg-opacity-80">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white" data-icon="security">security</span>
<span class="font-['Space_Grotesk'] uppercase tracking-widest text-white text-2xl font-bold tracking-tighter">AAPDA</span>
</div>
<div class="hidden md:flex gap-8 items-center">
<a class="font-label text-sm uppercase tracking-[0.2em] text-[#c8c6c6] hover:text-white transition-colors" href="#">Protocol</a>
<a class="font-label text-sm uppercase tracking-[0.2em] text-[#c8c6c6] hover:text-white transition-colors" href="#">Network</a>
<a class="font-label text-sm uppercase tracking-[0.2em] text-[#c8c6c6] hover:text-white transition-colors" href="#">Access</a>
</div>
</header>
<main class="min-h-screen pt-32 pb-20 px-6 flex flex-col items-center">
<!-- Hero Branding Section -->
<div class="w-full max-w-xl mb-16 space-y-4">
<div class="inline-block bg-surface-container-highest px-3 py-1 mb-4">
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-on-surface-variant">System Identity Initialization</span>
</div>
<h1 class="font-headline text-5xl md:text-7xl font-bold uppercase tracking-tighter leading-none mb-6">
                USER<br/><span class="text-secondary-fixed-dim">PROTOCOL</span>
</h1>
<p class="font-body text-on-surface-variant max-w-md leading-relaxed text-lg">
                Enter your biometric and regional telemetry to synchronize with the AAPDA secure network.
            </p>
</div>
<!-- Registration Form -->
<section class="w-full max-w-xl bg-surface-container-low p-8 md:p-12 relative">
<!-- Decorative Glitch Elements -->
<div class="absolute -top-1 -left-1 w-8 h-8 border-t-2 border-l-2 border-primary"></div>
<div class="absolute -bottom-1 -right-1 w-8 h-8 border-b-2 border-r-2 border-primary opacity-20"></div>
<form class="space-y-10">
<!-- Field Group: Identity -->
<div class="space-y-8">
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">Full Name</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant uppercase tracking-widest text-sm" placeholder="SURNAME, GIVEN NAME" type="text"/>
</div>
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">Phone Number</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant tracking-widest text-sm" placeholder="+00 000 000 0000" type="tel"/>
</div>
</div>
<!-- Field Group: Regional Telemetry -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">Country</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant uppercase tracking-widest text-sm" placeholder="GEOPOLITICAL ZONE" type="text"/>
</div>
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">State</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant uppercase tracking-widest text-sm" placeholder="ADMINISTRATIVE SECTOR" type="text"/>
</div>
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">Region</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant uppercase tracking-widest text-sm" placeholder="SUB-DISTRICT ID" type="text"/>
</div>
<div class="group">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-secondary mb-2 block">PIN</label>
<input class="w-full bg-surface-container border-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-white font-body px-0 py-3 transition-all placeholder:text-surface-variant tracking-widest text-sm" placeholder="****" type="password"/>
</div>
</div>
<!-- Action Section -->
<div class="pt-8">
<button class="w-full bg-white text-black font-label font-bold py-5 text-sm uppercase tracking-[0.4em] hover:bg-secondary transition-all active:scale-[0.98] duration-75 relative overflow-hidden group" type="submit">
<span class="relative z-10">INITIALIZE PROTOCOL</span>
<div class="absolute inset-0 bg-primary opacity-0 group-hover:opacity-10 transition-opacity"></div>
</button>
<div class="mt-6 flex justify-between items-center opacity-40">
<span class="font-label text-[8px] uppercase tracking-[0.2em]">Status: Pending Authorization</span>
<span class="font-label text-[8px] uppercase tracking-[0.2em]">v2.4.0_CORE</span>
</div>
</div>
</form>
</section>
<!-- Aesthetic Sidebar/Asymmetric Elements -->
<div class="fixed right-10 top-1/2 -translate-y-1/2 hidden xl:flex flex-col gap-12 pointer-events-none">
<div class="h-64 w-[1px] bg-outline-variant"></div>
<div class="rotate-90 origin-left translate-x-2">
<span class="font-label text-[10px] uppercase tracking-[1em] text-secondary-fixed-dim whitespace-nowrap">SECURE DATA TRANSMISSION CHANNEL ALPHA</span>
</div>
<div class="h-64 w-[1px] bg-outline-variant"></div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<!-- Decorative Background Noise/Grid (Subtle) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-5">
<div class="absolute inset-0" style="background-image: radial-gradient(circle at 2px 2px, #ffffff 1px, transparent 0); background-size: 40px 40px;"></div>
</div>
</body></html>
