</button>
</header>
<main class="min-h-screen pt-24 pb-32 px-6 max-w-md mx-auto flex flex-col justify-center">
<!-- Hero Section -->
<section class="mb-12">
<div class="inline-block bg-primary text-on-primary px-2 py-1 font-label text-[10px] tracking-[0.2em] uppercase mb-4">
                Identity Layer 02
            </div>
<h1 class="font-headline text-5xl font-bold leading-tight tracking-[-0.05em] text-white mb-2">
                VERIFY<br/>CONTACT
            </h1>
<p class="text-secondary font-body text-sm leading-relaxed max-w-[280px]">
                Establish a secure link between your physical presence and digital node.
            </p>
</section>
<!-- Form Section -->
<div class="space-y-8">
<!-- Email Input -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest text-secondary uppercase mb-2">
                    Email Address
                </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:border-b focus:border-primary text-white py-4 px-0 font-headline text-lg transition-all border-b border-outline-variant/30" placeholder="USER@NODE.TERMINAL" type="email"/>
<div class="absolute right-0 bottom-4 opacity-20 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-xs" data-icon="alternate_email">alternate_email</span>
</div>
</div>
</div>
<!-- Phone Input -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest text-secondary uppercase mb-2">
                    Phone Number
                </label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none focus:ring-0 focus:border-b focus:border-primary text-white py-4 px-0 font-headline text-lg transition-all border-b border-outline-variant/30" placeholder="+00 000 000 000" type="tel"/>
<div class="absolute right-0 bottom-4 opacity-20 group-focus-within:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-xs" data-icon="dialpad">dialpad</span>
</div>
</div>
</div>
</div>

</div>

</div>
